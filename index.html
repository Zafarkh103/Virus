<!DOCTYPE html>
<html>
<head>
    <title>🔔 Notification Bomber</title>
    <style>
        body {
            background: #000;
            font-family: Arial;
            text-align: center;
            padding: 50px;
        }
        button {
            background: red;
            color: white;
            border: none;
            padding: 20px 40px;
            font-size: 24px;
            border-radius: 10px;
            cursor: pointer;
            margin: 20px;
        }
        .counter {
            color: white;
            font-size: 50px;
            margin: 20px;
        }
    </style>
</head>
<body>
    <h1 style="color:red;">💣 NOTIFICATION BOMBER</h1>
    <div class="counter" id="count">0</div>
    <button onclick="startBomb()">💥 START BOMB</button>

    <script>
        let bombInterval;
        let count = 0;

        async function startBomb() {
            try {
                // Request permission
                const perm = await Notification.requestPermission();
                
                if(perm === 'granted') {
                    // Simple bomb - no animations, no extra intervals
                    bombInterval = setInterval(() => {
                        count++;
                        document.getElementById('count').textContent = count;
                        
                        new Notification('⚠️ VIRUS DETECTED!', {
                            body: 'Click to remove threat',
                            requireInteraction: true
                        });
                        
                    }, 3000); // Har 3 second
                } else {
                    alert('❌ Notification permission denied!');
                }
            } catch(e) {
                alert('❌ Error: ' + e.message);
            }
        }
    </script>
</body>
</html>
